{% extends 'base.html' %}

{% block title %}Add Fee{% endblock %}
{% block page_title %}Add Student Fee{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-dollar-sign"></i> Fee Entry Form</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Student *</label>
                        <select name="student_id" class="form-control" required>
                            <option value="">Select Student</option>
                            {% for student in students %}
                            <option value="{{ student.student_id }}">{{ student.student_number }} - {{ student.first_name }} {{ student.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Academic Term</label>
                        <select name="term_id" class="form-control">
                            <option value="">Select Term</option>
                            {% for term in terms %}
                            <option value="{{ term.term_id }}">{{ term.semester }} {{ term.academic_year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fee Type *</label>
                        <select name="fee_type" class="form-control" required>
                            <option value="Tuition">Tuition</option>
                            <option value="Library">Library</option>
                            <option value="Lab">Lab</option>
                            <option value="Sports">Sports</option>
                            <option value="Student Union">Student Union</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount *</label>
                        <input type="number" name="amount" class="form-control" required step="0.01" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Due Date *</label>
                        <input type="date" name="due_date" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Fee</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
