{% extends 'base.html' %}

{% block title %}Add Course{% endblock %}
{% block page_title %}Add New Course{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-book"></i> Course Registration Form</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Course Code *</label>
                        <input type="text" name="course_code" class="form-control" required placeholder="e.g., CS101">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Course Name *</label>
                        <input type="text" name="course_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Credits *</label>
                        <input type="number" name="credits" class="form-control" required min="1" max="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Department *</label>
                        <select name="department_id" class="form-control" required>
                            <option value="">Select Department</option>
                            {% for dept in departments %}
                            <option value="{{ dept.dept_id }}">{{ dept.dept_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Course</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
