{% extends 'base.html' %}

{% block title %}Enroll Student{% endblock %}
{% block page_title %}Student Enrollment{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-user-graduate"></i> Enrollment Form</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Student *</label>
                        <select name="student_id" class="form-control" required>
                            <option value="">Select Student</option>
                            {% for student in students %}
                            <option value="{{ student.student_id }}">{{ student.student_number }} - {{ student.first_name }} {{ student.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Section *</label>
                        <select name="section_id" class="form-control" required>
                            <option value="">Select Section</option>
                            {% for section in sections %}
                            <option value="{{ section.SectionID }}">
                                {{ section.SectionCode }} - {{ section.CourseCode }} {{ section.CourseName }}
                                (Available: {{ section.AvailableSeats }} seats)
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle"></i> 
                        <strong>Note:</strong> If the section is full, the student will be automatically added to the waitlist.
                    </div>
                    <button type="submit" class="btn btn-success"><i class="fas fa-check"></i> Enroll Student</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
