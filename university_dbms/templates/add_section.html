{% extends 'base.html' %}

{% block title %}Add Section{% endblock %}
{% block page_title %}Add New Section{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-chalkboard"></i> Section Creation Form</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Section Name *</label>
                        <input type="text" name="section_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Academic Term *</label>
                        <select name="term_id" class="form-control" required>
                            <option value="">Select Term</option>
                            {% for term in terms %}
                            <option value="{{ term.term_id }}">{{ term.semester }} {{ term.academic_year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Course *</label>
                        <select name="course_id" class="form-control" required>
                            <option value="">Select Course</option>
                            {% for course in courses %}
                            <option value="{{ course.course_id }}">{{ course.course_code }} - {{ course.course_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teacher</label>
                        <select name="teacher_id" class="form-control">
                            <option value="">Select Teacher</option>
                            {% for teacher in teachers %}
                            <option value="{{ teacher.teacher_id }}">{{ teacher.first_name }} {{ teacher.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Classroom</label>
                        <select name="room_id" class="form-control">
                            <option value="">Select Classroom</option>
                            {% for room in classrooms %}
                            <option value="{{ room.room_id }}">{{ room.room_number }} - {{ room.building }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Schedule</label>
                        <input type="text" name="schedule" class="form-control" placeholder="e.g., Monday 10:00-12:00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Max Capacity</label>
                        <input type="number" name="max_capacity" class="form-control" value="40" min="1">
                    </div>
                    <div class="alert alert-info">
                        <small><i class="fas fa-info-circle"></i> Section code will be auto-generated</small>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Section</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
